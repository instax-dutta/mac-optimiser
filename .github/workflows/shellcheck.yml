name: ShellCheck
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: shellcheck/shellcheck-action@v1
        with:
          targets: mac_optimizer.sh
